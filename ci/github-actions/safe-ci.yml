name: Safe CI — Agent Guardrails

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      # GUARDRAIL: Сборка должна проходить без warning'ов
      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true

  tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # GUARDRAIL: dotnet test опасен — используем dotnet run --project
      # Скрипт автоматически находит тестовые проекты в tests/ и src/.
      # Адаптируй TEST_DIRS в ci/scripts/run-tests.sh под структуру своего проекта.
      - name: Run Tests
        run: |
          chmod +x ci/scripts/run-tests.sh
          ci/scripts/run-tests.sh

      # GUARDRAIL: Проверяем, что тесты реально запустились (не 0 ran)
      - name: Verify Tests Ran
        run: |
          chmod +x ci/scripts/verify-tests.sh
          ci/scripts/verify-tests.sh

  load-tests:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # GUARDRAIL: NBomber на PR — проверяем, что нет деградации
      # Адаптируй путь под свой проект. Или используй run-tests.sh с фильтром по NBomber.
      - name: Run Load Tests
        run: dotnet run --project tests/LoadTests/LoadTests.csproj --configuration Release

  snapshot-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # GUARDRAIL: OpenAPI snapshot не должен расходиться
      # Адаптируй путь к тестовому проекту и папке snapshots под свой проект.
      - name: Verify OpenAPI Snapshot
        run: |
          dotnet run --project tests/IntegrationTests/IntegrationTests.csproj --filter "FullyQualifiedName~OpenApi"
          git diff --exit-code tests/IntegrationTests/Snapshots/ || (echo "OpenAPI snapshot changed! Update it intentionally." && exit 1)
